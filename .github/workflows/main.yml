name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

  deploy-backend:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend deploy
        run: curl "$RENDER_BACKEND_DEPLOY_HOOK"
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}

      - name: Wait for backend deployment
        run: sleep 90

      - name: Backend sanity check
        run: curl -f "${{ secrets.BACKEND_URL }}/health"

  deploy-frontend:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Trigger frontend deploy
        run: curl "$RENDER_FRONTEND_DEPLOY_HOOK"
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}

      - name: Wait for frontend deployment
        run: sleep 90

      - name: Frontend sanity check
        run: curl -f "${{ secrets.FRONTEND_URL }}"
